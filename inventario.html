<!doctype html>
<html>
  <head>
    <title>Inventario</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header-page">
      <a href="#" onclick="volverDashboard()" class="btn-volver">
        ← Dashboard
      </a>

      <h1>🧴 Inventario</h1>
    </header>

    <div class="contenedor">
      <div class="form-card">
        <h2>Nuevo Insumo</h2>

        <div class="grupo-formulario">
          <label>Nombre del Insumo</label>
          <input type="text" id="insumo" placeholder="Ej: Detergente" />
        </div>

        <div class="grupo-formulario">
          <label>Cantidad</label>
          <input type="number" id="cantidad" placeholder="Ej: 15" />
        </div>

        <button onclick="guardarInsumo()">Guardar Insumo</button>
      </div>

      <br />

      <h2>Inventario Registrado</h2>

      <div class="tabla-container">
        <table>
          <thead>
            <tr>
              <th>Insumo</th>
              <th>Cantidad</th>
            </tr>
          </thead>

          <tbody id="tablaInventario"></tbody>
        </table>
      </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/inventario.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
