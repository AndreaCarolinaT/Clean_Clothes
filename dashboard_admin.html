<!doctype html>
<html lang="es">
  <head>

          <p>Inventario</p>
        </a>

        <a href="notificaciones.html" class="card card-link">
          <h3>🔔</h3>
          <p>Notificaciones</p>
        </a>

        <a href="seguimiento.html" class="card card-link">
          <h3>📍</h3>
          <p>Seguimiento</p>
        </a>
      </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/pedidos.js"></script>
