<!doctype html>
<html>
  <head>
    <title>Notificaciones</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header-page">
      <a href="#" onclick="volverDashboard()" class="btn-volver">
        ← Dashboard
      </a>

      <h1>🔔 Notificaciones</h1>
    </header>

    <div class="contenedor">
      <div id="panelAdmin">
        <div class="form-card">
          <h2>Nueva Notificación</h2>

          <div class="grupo-formulario">
            <label>Destinatario</label>

            <select id="destinatario">
              <option>Cliente</option>
              <option>Operario</option>
              <option>Administrador</option>
            </select>
          </div>

          <div class="grupo-formulario">
            <label>Mensaje</label>

            <textarea
              id="mensajeNotificacion"
              rows="4"
              placeholder="Escriba la notificación"
            >
            </textarea>
          </div>

          <button onclick="guardarNotificacion()">Enviar Notificación</button>
        </div>
      </div>

      <br />

      <h2 id="tituloNotificaciones"></h2>

      <div class="tabla-container">
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Destinatario</th>
              <th>Mensaje</th>
            </tr>
          </thead>

          <tbody id="tablaNotificaciones"></tbody>
        </table>
      </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/notificaciones.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
