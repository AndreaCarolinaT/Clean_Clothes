<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Pedidos | Clean Clothes</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="header-page">
      <a href="#" onclick="volverDashboard()" class="btn-volver">
        ← Dashboard
      </a>

      <h1>📦 Gestión de Pedidos</h1>

      <a href="registrar_pedido.html" class="btn-accion"> + Nuevo Pedido </a>
    </header>
    <div class="contenedor">
      <div class="estadisticas">
        <div class="card">
          <h3 id="totalPedidos">0</h3>
          <p>Pedidos Totales</p>
        </div>

        <div class="card">
          <h3 id="enProceso">0</h3>
          <p>En Proceso</p>
        </div>

        <div class="card">
          <h3 id="listos">0</h3>
          <p>Listos</p>
        </div>

        <div class="card">
          <h3 id="entregados">0</h3>
          <p>Entregados</p>
        </div>
      </div>

      <section class="tabla-container">
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Servicio</th>
              <th>Fecha</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>

          <tbody id="tablaPedidos"></tbody>
        </table>
      </section>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/pedidos.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
