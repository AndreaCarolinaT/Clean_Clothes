<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Clean Clothes - Login</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-card">
        <h1>🧺 Clean Clothes</h1>
        <p class="subtitle">Sistema de gestión de lavandería</p>

        <label>Usuario</label>
        <input type="text" id="user" placeholder="Ingrese su usuario" />

        <label>Contraseña</label>
        <input type="password" id="pass" placeholder="Ingrese su contraseña" />

        <button onclick="login()">Iniciar sesión</button>

        <p id="msg"></p>

        <small>Acceso: admin / operario / cliente</small>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
